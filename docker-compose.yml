services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: file:../data/dev.db
      PORT: 4000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://backend:4000
    depends_on:
      - backend
